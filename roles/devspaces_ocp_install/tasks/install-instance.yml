---
- name: Create getting started sample workspace tiles
  kubernetes.core.k8s:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    state: present
    resource_definition: "{{ lookup('template', 'configmaps/workspaces.yaml.j2') | from_yaml }}"

- name: Ensure Nested Podman SCC is applied
  kubernetes.core.k8s:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    state: present
    resource_definition: "{{ lookup('template', 'scc/devspaces-nested-podman.yaml.j2') | from_yaml }}"
  when: devspaces_ocp_install_apply_scc | default(true)
  register: scc_result

- name: Debug SCC application status
  ansible.builtin.debug:
    msg: "SCC {{ devspaces_ocp_install_scc_name }} was successfully updated/created."
  when: scc_result.changed

- name: Deploy CheCluster instance
  kubernetes.core.k8s:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    state: present
    resource_definition: "{{ lookup('template', 'instance/checluster.yaml.j2') | from_yaml | ansible.builtin.combine(devspaces_ocp_install_instance['instance_manifest_overrides'] | default({}), recursive=true) }}"
    apply: true

- name: Wait for CheCluster to have URL populated
  kubernetes.core.k8s_info:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    api_version: org.eclipse.che/v2
    kind: CheCluster
    name: "{{ devspaces_ocp_install_instance['instance_name'] }}"
    namespace: "{{ devspaces_ocp_install_namespace }}"
  register: __devspaces_ocp_install_che_instance
  until:
    - __devspaces_ocp_install_che_instance.resources | length > 0
    - __devspaces_ocp_install_che_instance.resources[0].status.cheURL is defined
    - __devspaces_ocp_install_che_instance.resources[0].status.cheURL | length > 0
  retries: 50
  delay: 15

- name: Extract Dev Spaces Dashboard URL
  ansible.builtin.set_fact:
    __devspaces_ocp_install_dashboard_url: "{{ __devspaces_ocp_install_che_instance.resources[0].status.cheURL }}"

- name: Display Dev Spaces URL
  ansible.builtin.debug:
    msg: "Dev Spaces is ready! Access the dashboard at: {{ __devspaces_ocp_install_dashboard_url }}"

- name: Create OCP Console Link
  when: devspaces_ocp_install_instance['create_link'] | default(true) | bool
  kubernetes.core.k8s:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    state: present
    resource_definition: "{{ lookup('template', 'instance/consolelink.yaml.j2') | from_yaml | ansible.builtin.combine(devspaces_ocp_install_instance['consolelink_manifest_overrides'] | default({}), recursive=true) }}"
    apply: true
...
