---


- name: Create operator group
  when: devspaces_ocp_install_operator['operatorgroup_create'] | default(true) | bool
  kubernetes.core.k8s:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    state: present
    resource_definition: "{{ lookup('template', 'operator/operatorgroup.yaml.j2') | from_yaml | ansible.builtin.combine(devspaces_ocp_install_operator['operatorgroup_manifest_overrides'] | default({}), recursive=true) }}"
    apply: true

- name: Create subscription
  kubernetes.core.k8s:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    state: present
    resource_definition: "{{ lookup('template', 'operator/subscription.yaml.j2') | from_yaml | ansible.builtin.combine(devspaces_ocp_install_operator['subscription_manifest_overrides'] | default({}), recursive=true) }}"
    apply: true

- name: Wait for CheCluster CustomResourceDefinition to appear
  kubernetes.core.k8s_info:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: checlusters.org.eclipse.che
  register: __devspaces_ocp_install_crd_check
  until: __devspaces_ocp_install_crd_check.resources | length > 0
  retries: 20
  delay: 10

- name: Wait for Dev Spaces Operator deployment to be Ready
  kubernetes.core.k8s_info:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
    api_version: apps/v1
    kind: Deployment
    name: devspaces-operator
    namespace: "{{ devspaces_ocp_install_namespace }}"
  register: __devspaces_ocp_install_operator_dep
  until:
    - __devspaces_ocp_install_operator_dep.resources is defined
    - __devspaces_ocp_install_operator_dep.resources | length > 0
    - __devspaces_ocp_install_operator_dep.resources[0].status.readyReplicas is defined
    - __devspaces_ocp_install_operator_dep.resources[0].status.readyReplicas > 0
  retries: 30
  delay: 10
...
