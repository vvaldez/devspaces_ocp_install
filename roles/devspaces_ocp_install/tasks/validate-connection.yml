---
- name: Validate OpenShift connection
  kubernetes.core.k8s_cluster_info:
    host: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['host'] }}"
    api_key: "{{ __devspaces_ocp_install_auth_results['openshift_auth']['api_key'] }}"
    validate_certs: "{{ devspaces_ocp_install_connection['validate_certs'] | default(omit) }}"
  register: __devspaces_ocp_install_cluster_info

- name: Display cluster info
  ansible.builtin.debug:
    msg: "Connected to OpenShift cluster version {{ __devspaces_ocp_install_cluster_info.version.server.kubernetes.gitVersion }}"
...
