---
- name: Install OpenShift Dev Spaces
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    namespace: openshift-devspaces
    operator_channel: stable

  tasks:
    - name: Remove stale CheCluster CRD (if exists)
      kubernetes.core.k8s:
        state: absent
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: checlusters.org.eclipse.che

    - name: Remove stale Dev Spaces subscription (if exists)
      kubernetes.core.k8s:
        state: absent
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: devspaces
        namespace: "{{ namespace }}"

    - name: Create Namespace for Dev Spaces
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ namespace }}"

    - name: Create OperatorGroup
      kubernetes.core.k8s:
        definition:
          apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: devspaces-operatorgroup
            namespace: "{{ namespace }}"
          spec: {}

    - name: Subscribe to Dev Spaces Operator
      kubernetes.core.k8s:
        definition:
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: devspaces
            namespace: "{{ namespace }}"
          spec:
            channel: "{{ operator_channel }}"
            installPlanApproval: Automatic
            name: devspaces
            source: redhat-operators
            sourceNamespace: openshift-marketplace

    - name: Wait for CheCluster CustomResourceDefinition to appear
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: checlusters.org.eclipse.che
      register: crd_check
      until: crd_check.resources | length > 0
      retries: 20
      delay: 10

    - name: Wait for Dev Spaces Operator pod to be Ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: devspaces-operator
        namespace: "{{ namespace }}"
      register: operator_dep
      until:
        - operator_dep.resources is defined
        - operator_dep.resources | length > 0
        - operator_dep.resources[0].status.readyReplicas is defined
        - operator_dep.resources[0].status.readyReplicas > 0
      retries: 30
      delay: 10

    - name: Deploy default CheCluster instance
      kubernetes.core.k8s:
        definition:
          apiVersion: org.eclipse.che/v2
          kind: CheCluster
          metadata:
            name: devspaces
            namespace: "{{ namespace }}"
          spec:
            components:
              cheServer:
                debug: false
            containerRegistry: {}
            devEnvironments:
              storage:
                pvcStrategy: per-user

    - name: Wait for CheCluster to have URL populated
      kubernetes.core.k8s_info:
        api_version: org.eclipse.che/v2
        kind: CheCluster
        name: devspaces
        namespace: "{{ namespace }}"
      register: che_instance
      until: 
        - che_instance.resources | length > 0
        - che_instance.resources[0].status.cheURL is defined
        - che_instance.resources[0].status.cheURL | length > 0
      retries: 50
      delay: 15

    - name: Extract Dev Spaces Dashboard URL
      ansible.builtin.set_fact:
        devspaces_url: "{{ che_instance.resources[0].status.cheURL }}"

    - name: Display Dev Spaces URL
      ansible.builtin.debug:
        msg: "Dev Spaces is ready! Access the dashboard at: {{ devspaces_url }}"
...
